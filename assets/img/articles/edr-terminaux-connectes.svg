<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" role="img" aria-labelledby="edrTitle edrDesc">
<title id="edrTitle">Illustration EDR : terminaux connectés à un point de contrôle central</title>
<desc id="edrDesc">Schéma minimaliste montrant un poste fixe, un ordinateur portable, un smartphone et un serveur reliés par des lignes fines à un point de contrôle central, sur fond noir avec des accents cyan.</desc>
<rect x="0" y="0" width="680" height="420" fill="#08090b"/>
<line x1="340" y1="210" x2="150" y2="90" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
<line x1="340" y1="210" x2="530" y2="90" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
<line x1="340" y1="210" x2="150" y2="330" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
<line x1="340" y1="210" x2="530" y2="330" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
<circle cx="245" cy="150" r="2.5" fill="#5eead4"/>
<circle cx="435" cy="150" r="2.5" fill="#5eead4"/>
<circle cx="245" cy="270" r="2.5" fill="#5eead4"/>
<circle cx="435" cy="270" r="2.5" fill="#5eead4"/>
<circle cx="340" cy="210" r="14" fill="none" stroke="#5eead4" stroke-width="1"/>
<circle cx="340" cy="210" r="5" fill="#5eead4"/>
<g stroke="#5eead4" stroke-width="1" fill="none">
<rect x="120" y="65" width="60" height="40" rx="3"/>
<line x1="140" y1="105" x2="160" y2="105"/>
<rect x="500" y="65" width="60" height="42" rx="3"/>
<circle cx="530" cy="86" r="1.5" fill="#5eead4" stroke="none"/>
<rect x="128" y="300" width="26" height="46" rx="4"/>
<rect x="500" y="298" width="60" height="50" rx="3"/>
<line x1="500" y1="312" x2="560" y2="312"/>
<line x1="500" y1="326" x2="560" y2="326"/>
</g>
<text x="150" y="130" fill="#e6e7ea" font-size="12" text-anchor="middle" font-family="Geist, sans-serif" opacity="0.6">poste fixe</text>
<text x="530" y="135" fill="#e6e7ea" font-size="12" text-anchor="middle" font-family="Geist, sans-serif" opacity="0.6">portable</text>
<text x="141" y="365" fill="#e6e7ea" font-size="12" text-anchor="middle" font-family="Geist, sans-serif" opacity="0.6">mobile</text>
<text x="530" y="368" fill="#e6e7ea" font-size="12" text-anchor="middle" font-family="Geist, sans-serif" opacity="0.6">serveur</text>
</svg>
